<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TV Show Project | Mahammad Osman (Darkidd77)</title>
    <link href="style.css" rel="stylesheet" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  </head>

  <body>
    <header class="header-controls">
      <div id="status-message"></div>

      <nav aria-label="Episode controls">
        <label for="episode-selector">Jump to episode: </label>
        <select id="episode-selector">
          <option value="all">-- Show all episodes --</option>
        </select>

        <label for="search-input">Search episodes: </label>
        <input type="text" id="search-input" placeholder="Type to search..." />

        <p id="episode-count"></p>
      </nav>
    </header>

    <div id="root"></div>

    <script src="script.js"></script>
  </body>
</html>
